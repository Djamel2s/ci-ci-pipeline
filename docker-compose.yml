services:
  backend:
    image: Djamel2s/ci-ci-pipeline:backend
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "3001:3001"
    networks:
      - appbridge

  frontend:
    image: Djamel2s/ci-ci-pipeline:frontend
    build:
      context: .
      dockerfile: frontend/Dockerfile
    ports:
      - "3000:3000"
    networks:
      - appbridge

networks:
  appbridge:
    driver: bridge
