name: CD - Build and push images on main

on:
  push:
    branches: [main]

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Create backend .env
        run: |
          printf "APP_SECRET_NAME=%s\n" "${{ secrets.APP_SECRET_NAME }}" > backend/.env

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: (Backend) Build and push image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/ci-ci-pipeline-backend:latest ./backend
          docker push ${{ secrets.DOCKER_USERNAME }}/ci-ci-pipeline-backend:latest

      - name: (Frontend) Build and push image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/ci-ci-pipeline-frontend:latest ./frontend
          docker push ${{ secrets.DOCKER_USERNAME }}/ci-ci-pipeline-frontend:latest
