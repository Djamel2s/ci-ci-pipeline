name: CI for PRs to dev

on:
  pull_request:
    branches: [dev]

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: "npm"
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json

      - name: (Backend) Install dependencies
        run: npm ci
        working-directory: ./backend

      - name: (Frontend) Install dependencies
        run: npm ci
        working-directory: ./frontend

      - name: (Backend) Lint
        run: npm run lint
        working-directory: ./backend

      - name: (Frontend) Lint
        run: npm run lint
        working-directory: ./frontend

      - name: (Backend) npm audit
        run: npm audit
        working-directory: ./backend

      - name: (Frontend) npm audit
        run: npm audit
        working-directory: ./frontend

      - name: (Backend) Snyk
        run: npx snyk test
        working-directory: ./backend

      - name: (Frontend) Snyk
        run: npx snyk test
        working-directory: ./frontend

      - name: (Backend) Tests
        run: npm test
        working-directory: ./backend

      - name: (Frontend) Tests
        run: CI=true npm test -- --watchAll=false
        working-directory: ./frontend

      - name: (Backend) Build Docker image
        run: docker build -t ${{ github.repository }}:backend-pr-${{ github.sha }} ./backend

      - name: (Frontend) Build Docker image
        run: docker build -t ${{ github.repository }}:frontend-pr-${{ github.sha }} ./frontend
